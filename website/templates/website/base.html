<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Anatoli | Software Developer{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased min-h-screen flex flex-col">

    <nav class="bg-slate-800/50 backdrop-blur-md border-b border-slate-700/50 sticky top-0 z-50 py-4">
        <div class="max-w-4xl mx-auto px-6 flex justify-between items-center">
            <a href="{% url 'website:index' %}" class="text-xl font-bold tracking-tight bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">
                {{ profile.owner_first_name }}.Dev
            </a>
            <div class="space-x-6 text-sm font-medium">
                <a href="#" class="text-slate-300 hover:text-white transition">Über mich</a>
                <a href="#" class="text-slate-300 hover:text-white transition">Kontakt</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-4xl w-full mx-auto px-6 py-12">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-slate-950 border-t border-slate-800/60 py-6 text-center text-sm text-slate-500">
        &copy; 2026 {{ profile.owner_first_name }} {{ profile.owner_last_name }}. Erstellt mit Django + Tailwind + htmx
    </footer>

    <script>
        document.body.addEventListener('htmx:configRequest', (event) => {
            event.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
        });
    </script>
</body>
</html>
